name: CI
on:
  push:
    branches: [master]
  pull_request:
permissions:
  contents: read
jobs:
  validate-app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm test
      - run: bash -n build.sh install.sh uninstall.sh
      - run: npm audit --audit-level=high
      - run: ./build.sh
